<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cek Status Magang & PKL</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stylecekstatus.css">
</head>
<body>
 <body>
    <div class="area">
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div>

    <nav class="navbar">

<div class="card">
    <div class="header-section">
        <div class="header-section">
    <img src='logo_tegal.png' alt="Logo BKPSDM" class="logo-instansi">
    
        <h2>Cek Status Pengajuan</h2>
        <p class="subtitle">Silakan masukkan data pendaftaran Anda</p>
    </div>

    <div class="form-group">
        <label for="inputNama">Nama Lengkap</label>
        <input type="text" id="inputNama" placeholder="Contoh: Budi Santoso" autocomplete="off">
    </div>

    <div class="form-group">
        <label for="inputNPM">NPM / NIS</label>
        <input type="text" id="inputNPM" placeholder="Masukkan nomor induk" autocomplete="off">
    </div>

    <button id="btnCek" onclick="cariData()">Periksa Status Sekarang</button>
    <div id="loader" class="loader"></div>

    <div id="resultBox">
        <div class="result-item">
            <div class="result-label">Nama Peserta</div>
            <div id="resNama" class="result-value">-</div>
        </div>
        
        <div class="result-item">
            <div class="result-label">Institusi</div>
            <div id="resKampus" class="result-value">-</div>
        </div>

        <div class="result-item">
            <div class="result-label">Status Terakhir</div>
            <div id="resStatus" class="status-pill">-</div>
        </div>
        
        <div id="resWaktu" style="font-size: 0.7rem; color: #94a3b8; margin-top: 1rem; border-top: 1px solid #e2e8f0; padding-top: 8px;"></div>
    </div>

    <p class="footer-note">Hubungi bagian administrasi jika data tidak ditemukan.</p>
</div>

<script>
    async function cariData() {
        const nama = document.getElementById('inputNama').value.trim().toLowerCase();
        const npm = document.getElementById('inputNPM').value.trim();
        const btn = document.getElementById('btnCek');
        const loader = document.getElementById('loader');
        const resBox = document.getElementById('resultBox');

        if (!nama || !npm) {
            alert("Harap isi Nama dan NPM!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Mencari...";
        loader.style.display = 'block';
        resBox.style.display = 'none';

        try {
            // URL Google Apps Script Anda
            const webAppUrl = "https://script.google.com/macros/s/AKfycby81TWLHIIxw0rm-hKQaRv5srpy5adbpPPjZHhNSNjUVL2Bf_63W_Kcl99jy_AI3g8J/exec";
            const response = await fetch(webAppUrl);
            const data = await response.json();
            // Tambahkan .reverse() sebelum .find() untuk mencari dari data yang paling baru
const user = data.reverse().find(row => 
    row["Nama Lengkap"]?.toString().toLowerCase().includes(nama) && 
    row["Nomor Induk Siswa (NIS) / Nomor Induk Mahasiswa (NIM)"]?.toString() === npm
);
           

            if (user) {
                resBox.style.display = 'block';
                document.getElementById('resNama').innerText = user["Nama Lengkap"];
                document.getElementById('resKampus').innerText = user["Asal Institusi Pendidikan"];
                
                const statusAktif = user["Status Terakhir"] || "Dalam Proses";
                const resStatus = document.getElementById('resStatus');
                resStatus.innerText = statusAktif;

                resStatus.className = 'status-pill';

const s = statusAktif.toLowerCase();

if (s.includes('setujui') || s.includes('terima')) {
    resStatus.classList.add('disetujui');
} 
else if (s.includes('tolak')) {
    resStatus.classList.add('ditolak');
} 
else {
    resStatus.classList.add('menunggu');
}

                document.getElementById('resWaktu').innerText = "Update terakhir: " + (user["Waktu Notifikasi"] || "-");
            } else {
                alert("Data tidak ditemukan. Pastikan Nama dan NPM sesuai.");
            }
        } catch (e) {
            alert("Gagal mengambil data. Pastikan koneksi internet stabil.");
        } finally {
            btn.disabled = false;
            btn.innerText = "Periksa Status Sekarang";
            loader.style.display = 'none';
        }
    }
</script>

</body>
</html>
